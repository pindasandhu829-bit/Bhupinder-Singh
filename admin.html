<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChromaBet Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--sf:#0f0f1a;--card:#151520;--c2:#1c1c2e;--br:#252535;--tx:#f0f0ff;--mu:#6060a0;--red:#ff3b5c;--gr:#00e676;--bl:#3d5afe;--gd:#ffd700;--vi:#9c27b0;--or:#ff9800;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Space Mono',monospace;min-height:100vh;display:flex;}
/* SIDEBAR */
.sb{width:220px;background:var(--sf);border-right:1px solid var(--br);display:flex;flex-direction:column;padding:24px 0;flex-shrink:0;min-height:100vh;}
.sblogo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;padding:0 20px 22px;border-bottom:1px solid var(--br);margin-bottom:14px;}
.sblogo span{background:linear-gradient(135deg,#3d5afe,#ff3b5c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.abadge{display:inline-block;background:rgba(255,152,0,.15);border:1px solid rgba(255,152,0,.3);color:var(--or);font-size:.52rem;padding:2px 8px;border-radius:20px;letter-spacing:2px;margin-top:4px;font-family:'Space Mono',monospace;}
.ni{display:flex;align-items:center;gap:10px;padding:11px 20px;color:var(--mu);cursor:pointer;font-size:.78rem;transition:all .2s;border-left:3px solid transparent;}
.ni:hover{color:var(--tx);background:rgba(255,255,255,.03);}
.ni.on{color:var(--tx);border-left-color:var(--bl);background:rgba(61,90,254,.08);}
.nic{font-size:1rem;width:20px;text-align:center;}
.sbft{margin-top:auto;padding:16px 20px;border-top:1px solid var(--br);}
.outbtn{width:100%;padding:9px;border-radius:8px;border:1px solid var(--br);background:none;color:var(--mu);font-family:'Space Mono',monospace;font-size:.72rem;cursor:pointer;transition:all .2s;}
.outbtn:hover{border-color:var(--red);color:var(--red);}
/* MAIN */
.main{flex:1;overflow-y:auto;}
.topbar{padding:18px 26px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;}
.ptit{font-family:'Syne',sans-serif;font-weight:800;font-size:1.35rem;}
.trt{font-size:.72rem;color:var(--mu);}
.content{padding:22px 26px;}
/* PAGES */
