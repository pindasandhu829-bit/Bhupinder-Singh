<!DOCTYPE html>
<html lang="pa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Code Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #2a2a3d;
      --accent: #00f5c4;
      --accent2: #ff4d6d;
      --text: #e8e8f0;
      --muted: #6666aa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      z-index: 0;
    }

    /* Glowing orb */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,245,196,0.08) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.7s ease both;
    }

    .header .tag {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      display: block;
    }

    .header h1 {
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .header h1 span {
      color: var(--accent);
      position: relative;
    }

    .header p {
      margin-top: 0.7rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 400;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      animation: fadeUp 0.7s ease 0.15s both;
      box-shadow: 0 0 60px rgba(0,245,196,0.04);
    }

    /* Input area */
    .input-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
      font-family: 'Space Mono', monospace;
    }

    textarea, input[type="text"], select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      padding: 0.85rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: vertical;
    }

    textarea:focus, input[type="text"]:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,245,196,0.1);
    }

    textarea { min-height: 90px; }

    select option { background: var(--surface); }

    /* Options row */
    .options-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.2rem;
    }

    .color-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .color-pick {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.6rem 0.85rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .color-pick:hover { border-color: var(--accent); }

    .color-pick input[type="color"] {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    .color-pick span {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* Generate button */
    .btn-generate {
      width: 100%;
      padding: 1rem;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-generate::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
    }

    .btn-generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,245,196,0.35);
    }

    .btn-generate:active { transform: translateY(0); }

    /* QR Output */
    .qr-output {
      margin-top: 2rem;
      display: none;
      animation: fadeUp 0.5s ease both;
    }

    .qr-output.visible { display: block; }

    .qr-box {
      background: #fff;
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 0 40px rgba(0,245,196,0.15);
    }

    .qr-box::before, .qr-box::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--accent);
      border-style: solid;
    }

    .qr-box::before {
      top: -4px; left: -4px;
      border-width: 3px 0 0 3px;
      border-radius: 4px 0 0 0;
    }

    .qr-box::after {
      bottom: -4px; right: -4px;
      border-width: 0 3px 3px 0;
      border-radius: 0 0 4px 0;
    }

    #qrcode { display: flex; justify-content: center; }
    #qrcode canvas, #qrcode img { border-radius: 8px; }

    /* Actions */
    .qr-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-top: 1.2rem;
    }

    .btn-action {
      padding: 0.75rem;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .btn-download {
      background: var(--bg);
      color: var(--text);
    }

    .btn-download:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-copy {
      background: var(--bg);
      color: var(--text);
    }

    .btn-copy:hover {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    /* Info strip */
    .qr-info {
      margin-top: 1rem;
      padding: 0.7rem 1rem;
      background: rgba(0,245,196,0.05);
      border: 1px solid rgba(0,245,196,0.15);
      border-radius: 8px;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 1rem;
    }

    .qr-info span { color: var(--accent); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--accent);
      color: #0a0a0f;
      padding: 0.7rem 1.5rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.85rem;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 2rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      animation: fadeUp 0.7s ease 0.3s both;
    }
  </style>
</head>
<body>

  <div class="wrapper">

    <div class="header">
      <span class="tag">// instant generate</span>
      <h1>QR <span>Code</span><br>Generator</h1>
      <p>ਕੁਝ ਵੀ ਲਿਖੋ — QR ਬਣ ਜਾਵੇਗਾ</p>
    </div>

    <div class="card">

      <div class="input-group">
        <label>ਟੈਕਸਟ / URL / ਕੋਈ ਵੀ ਚੀਜ਼</label>
        <textarea id="qrInput" placeholder="https://example.com  ਜਾਂ  ਕੋਈ ਵੀ ਲਿਖੋ..."></textarea>
      </div>

      <div class="options-row">
        <div class="input-group" style="margin:0">
          <label>Size</label>
          <select id="qrSize">
            <option value="128">Small (128px)</option>
            <option value="200" selected>Medium (200px)</option>
            <option value="256">Large (256px)</option>
            <option value="320">XL (320px)</option>
          </select>
        </div>
        <div class="input-group" style="margin:0">
          <label>Error Correction</label>
          <select id="qrEcc">
            <option value="L">Low (L)</option>
            <option value="M" selected>Medium (M)</option>
            <option value="Q">High (Q)</option>
            <option value="H">Max (H)</option>
          </select>
        </div>
      </div>

      <div class="color-row">
        <div class="color-pick">
          <input type="color" id="qrFg" value="#000000" />
          <span>QR Color</span>
        </div>
        <div class="color-pick">
          <input type="color" id="qrBg" value="#ffffff" />
          <span>Background</span>
        </div>
      </div>

      <button class="btn-generate" onclick="generateQR()">⚡ Generate QR Code</button>

      <!-- QR Output -->
      <div class="qr-output" id="qrOutput">
        <div class="qr-box">
          <div id="qrcode"></div>
        </div>
        <div class="qr-info">
          <span id="charCount">0 chars</span>
          <span id="qrTimestamp"></span>
        </div>
        <div class="qr-actions">
          <button class="btn-action btn-download" onclick="downloadQR()">⬇ Download PNG</button>
          <button class="btn-action btn-copy" onclick="copyText()">⎘ Copy Text</button>
        </div>
      </div>

    </div>

    <div class="footer">made with ♥ · QR Code Generator</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let qrInstance = null;

    function generateQR() {
      const text = document.getElementById('qrInput').value.trim();
      if (!text) { showToast('ਕੁਝ ਲਿਖੋ ਪਹਿਲਾਂ! 📝'); return; }

      const size   = parseInt(document.getElementById('qrSize').value);
      const ecc    = document.getElementById('qrEcc').value;
      const fg     = document.getElementById('qrFg').value;
      const bg     = document.getElementById('qrBg').value;

      const eccMap = { L: QRCode.CorrectLevel.L, M: QRCode.CorrectLevel.M,
                       Q: QRCode.CorrectLevel.Q, H: QRCode.CorrectLevel.H };

      const container = document.getElementById('qrcode');
      container.innerHTML = '';
      if (qrInstance) { try { qrInstance.clear(); } catch(e){} }

      qrInstance = new QRCode(container, {
        text, width: size, height: size,
        colorDark: fg, colorLight: bg,
        correctLevel: eccMap[ecc]
      });

      document.getElementById('charCount').textContent = text.length + ' chars';
      document.getElementById('qrTimestamp').textContent =
        new Date().toLocaleTimeString('pa-IN');

      const output = document.getElementById('qrOutput');
      output.classList.remove('visible');
      void output.offsetWidth;
      output.classList.add('visible');

      showToast('QR ਬਣ ਗਿਆ! ✅');
    }

    function downloadQR() {
      const canvas = document.querySelector('#qrcode canvas');
      if (!canvas) { showToast('ਪਹਿਲਾਂ QR ਬਣਾਓ'); return; }
      const a = document.createElement('a');
      a.download = 'qr-code.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
      showToast('Download ਹੋ ਰਿਹਾ ਹੈ ⬇');
    }

    function copyText() {
      const text = document.getElementById('qrInput').value;
      if (!text) { showToast('ਕੁਝ ਨਹੀਂ ਕੋਪੀ ਕਰਨ ਲਈ'); return; }
      navigator.clipboard.writeText(text).then(() => showToast('ਕੋਪੀ ਹੋ ਗਿਆ! ⎘'));
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // Enter key shortcut
    document.getElementById('qrInput').addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'Enter') generateQR();
    });
  </script>
</body>
</html>
