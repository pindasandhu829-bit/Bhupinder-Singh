<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>5ChromaBet — Live</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:sans-serif;height:100vh;overflow:hidden;}

/* LINK INPUT BOX */
#inputBox{
  position:fixed;inset:0;background:#0c0c0c;z-index:999;
  display:flex;align-items:center;justify-content:center;
}
.ib-wrap{
  background:#161616;border:1px solid #242424;border-radius:20px;
  padding:32px;width:90%;max-width:420px;text-align:center;
}
.ib-logo{font-weight:800;font-size:1.4rem;color:#fff;margin-bottom:4px;}
.ib-logo span{color:#22c55e;}
.ib-sub{font-size:.78rem;color:#555;margin-bottom:24px;}
.ib-inp{
  width:100%;background:#111;border:1px solid #242424;border-radius:12px;
  padding:14px 16px;color:#fff;font-size:.9rem;outline:none;
  transition:border-color .2s;margin-bottom:12px;
}
.ib-inp:focus{border-color:#22c55e;}
.ib-btn{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:#22c55e;color:#000;font-weight:700;font-size:1rem;
  cursor:pointer;transition:all .2s;
}
.ib-btn:hover{background:#16a34a;}
.ib-hint{font-size:.7rem;color:#444;margin-top:10px;}

/* SCREEN COUNT */
.sc-row{display:flex;gap:8px;margin-bottom:16px;justify-content:center;flex-wrap:wrap;}
.sc-btn{
  padding:8px 14px;border-radius:8px;border:1px solid #242424;
  background:#111;color:#888;font-size:.8rem;font-weight:600;cursor:pointer;
}
.sc-btn.on{border-color:#22c55e;color:#22c55e;background:rgba(34,197,94,.08);}

/* VIDEO GRID */
#videoGrid{
  display:none;position:fixed;inset:0;background:#000;
  display:none;flex-direction:column;
}
#videoGrid.show{display:flex;}
.vg-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;background:#111;border-bottom:1px solid #1f1f1f;
  flex-shrink:0;
}
.vg-title{font-weight:700;font-size:.85rem;color:#fff;}
.vg-btns{display:flex;gap:8px;}
.vg-btn{
  padding:5px 12px;border-radius:7px;border:none;
  font-size:.78rem;font-weight:700;cursor:pointer;
}
.vg-change{background:#1f1f1f;color:#888;}
.vg-close{background:#ef4444;color:#fff;}
.vg-screens{
  flex:1;display:grid;gap:2px;padding:2px;overflow:hidden;
}
.vscreen{position:relative;overflow:hidden;background:#0a0a0a;}
.vscreen iframe{
  position:absolute;top:-10%;left:-10%;
  width:120%;height:120%;border:none;
}
.vscreen .num{
  position:absolute;bottom:4px;left:4px;
  background:rgba(0,0,0,.6);color:#22c55e;
  font-size:.55rem;font-weight:700;padding:2px 6px;
  border-radius:4px;z-index:10;
}
</style>
</head>
<body>

<!-- INPUT BOX -->
<div id="inputBox">
  <div class="ib-wrap">
    <div class="ib-logo"><span>5</span>ChromaBet</div>
    <div class="ib-sub">YouTube link paste karo — multi screen pe chalao!</div>

    <div style="font-size:.68rem;color:#555;margin-bottom:8px;text-align:left;">Screens</div>
    <div class="sc-row">
      <div class="sc-btn" onclick="setCount(4)">4</div>
      <div class="sc-btn" onclick="setCount(6)">6</div>
      <div class="sc-btn" onclick="setCount(9)">9</div>
      <div class="sc-btn on" onclick="setCount(12)">12</div>
      <div class="sc-btn" onclick="setCount(16)">16</div>
      <div class="sc-btn" onclick="setCount(20)">20</div>
    </div>

    <input class="ib-inp" id="linkInp" placeholder="https://youtube.com/watch?v=..." 
      onkeydown="if(event.key==='Enter')startPlay()"/>
    <button class="ib-btn" onclick="startPlay()">▶ Play on All Screens</button>
    <div class="ib-hint">YouTube, YouTube Shorts supported</div>
  </div>
</div>

<!-- VIDEO GRID -->
<div id="videoGrid">
  <div class="vg-bar">
    <div class="vg-title" id="vgTitle">🎬 Playing — 20 screens</div>
    <div class="vg-btns">
      <button class="vg-btn vg-change" onclick="changeLink()">🔗 Change</button>
      <button class="vg-btn vg-close" onclick="stopPlay()">✕ Stop</button>
    </div>
  </div>
  <div class="vg-screens" id="screens"></div>
</div>

<script>
let screenCount = 12;

function setCount(n){
  screenCount = n;
  document.querySelectorAll('.sc-btn').forEach(b=>{
    b.classList.toggle('on', b.textContent==n);
  });
}

function getEmbed(url){
  if(!url) return null;
  url = url.trim();
  
  // YouTube watch
  let m = url.match(/[?&]v=([^&\s]+)/);
  if(m) return 'https://www.youtube.com/embed/'+m[1]+'?autoplay=1&mute=1&loop=1&playlist='+m[1]+'&controls=0&modestbranding=1';
  
  // youtu.be
  let m2 = url.match(/youtu\.be\/([^?&\s]+)/);
  if(m2) return 'https://www.youtube.com/embed/'+m2[1]+'?autoplay=1&mute=1&loop=1&playlist='+m2[1]+'&controls=0&modestbranding=1';
  
  // Shorts
  let m3 = url.match(/shorts\/([^?&\s]+)/);
  if(m3) return 'https://www.youtube.com/embed/'+m3[1]+'?autoplay=1&mute=1&loop=1&playlist='+m3[1]+'&controls=0&modestbranding=1';
  
  return null;
}

function getGridCols(n){
  if(n<=4) return 2;
  if(n<=6) return 3;
  if(n<=9) return 3;
  if(n<=12) return 4;
  if(n<=16) return 4;
  return 5; // 20
}

function startPlay(){
  const url = document.getElementById('linkInp').value.trim();
  if(!url){ 
    document.getElementById('linkInp').style.borderColor='#ef4444';
    setTimeout(()=>document.getElementById('linkInp').style.borderColor='#242424',1500);
    return; 
  }
  
  const embed = getEmbed(url);
  if(!embed){
    alert('Valid YouTube link dalo!');
    return;
  }
  
  buildScreens(embed);
}

function buildScreens(embed){
  const grid = document.getElementById('screens');
  const cols = getGridCols(screenCount);
  const rows = Math.ceil(screenCount/cols);
  
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
  grid.innerHTML = '';
  
  for(let i=0; i<screenCount; i++){
    const div = document.createElement('div');
    div.className = 'vscreen';
    
    const iframe = document.createElement('iframe');
    iframe.src = embed + '&start=' + (i % 5); // slight offset
    iframe.setAttribute('frameborder','0');
    iframe.setAttribute('allowfullscreen','');
    iframe.setAttribute('allow','autoplay; encrypted-media; picture-in-picture');
    div.appendChild(iframe);
    
    const num = document.createElement('div');
    num.className = 'num';
    num.textContent = '#'+(i+1);
    div.appendChild(num);
    
    grid.appendChild(div);
  }
  
  document.getElementById('vgTitle').textContent = '🎬 Playing — '+screenCount+' screens';
  document.getElementById('inputBox').style.display = 'none';
  document.getElementById('videoGrid').classList.add('show');
}

function stopPlay(){
  document.getElementById('videoGrid').classList.remove('show');
  document.getElementById('screens').innerHTML = '';
  document.getElementById('inputBox').style.display = 'flex';
}

function changeLink(){
  document.getElementById('screens').innerHTML = '';
  document.getElementById('videoGrid').classList.remove('show');
  document.getElementById('inputBox').style.display = 'flex';
  document.getElementById('linkInp').focus();
}
</script>
</body>
</html>
