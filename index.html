<html lang="en">

<title>ChromaBet — Color Prediction</title>

<style>
:root{--bg:#0a0a0f;--surface:#12121a;--card:#1a1a26;--border:#2a2a3a;--text:#f0f0ff;--muted:#7070a0;--red:#ff3b5c;--green:#00e676;--blue:#3d5afe;--gold:#ffd700;--violet:#9c27b0;--orange:#ff9800;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(61,90,254,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(61,90,254,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;width:600px;height:600px;background:radial-gradient(circle,rgba(61,90,254,.12) 0%,transparent 70%);top:-200px;right:-200px;border-radius:50%;pointer-events:none;z-index:0;animation:orb 8s ease-in-out infinite alternate;}
@keyframes orb{from{transform:translate(0,0)}to{transform:translate(-100px,100px)}}
.wrap{max-width:960px;margin:0 auto;padding:20px;position:relative;z-index:1;}
/* LOGIN */
#LS{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;overflow-y:auto;padding:20px;}
.lbox{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:36px;width:100%;max-width:420px;}
.llogo{font-family:'Syne',sans-serif;font-weight:800;font-size:2.2rem;text-align:center;margin-bottom:6px;}
.llogo span{background:linear-gradient(135deg,#3d5afe,#ff3b5c,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.lsub{text-align:center;color:var(--muted);font-size:.75rem;margin-bottom:26px;}
.fl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;}
.fi{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Space Mono',monospace;font-size:.88rem;outline:none;margin-bottom:12px;transition:border-color .2s;}
.fi:focus{border-color:var(--blue);}
.lbtn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--blue),#7b1fa2);color:#fff;font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;transition:all .2s;}
.lbtn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(61,90,254,.4);}
.ltog{text-align:center;margin-top:14px;font-size:.72rem;color:var(--muted);}
.ltog a{color:var(--blue);cursor:pointer;}
.rhint{background:rgba(61,90,254,.1);border:1px solid rgba(61,90,254,.3);border-radius:8px;padding:9px 13px;font-size:.7rem;color:#9ab;margin-bottom:12px;}
/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 22px;border-bottom:1px solid var(--border);margin-bottom:22px;gap:12px;flex-wrap:wrap;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.7rem;letter-spacing:-1px;}
.logo span{background:linear-gradient(135deg,#3d5afe,#ff3b5c,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hrt{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.bxb{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 18px;text-align:right;}
.bxl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;}
.bxv{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;color:var(--gold);}
.uchip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:7px 13px;font-size:.72rem;color:var(--muted);}
.uchip strong{color:var(--text);}
.outbtn{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 13px;color:var(--muted);font-family:'Space Mono',monospace;font-size:.68rem;cursor:pointer;transition:all .2s;}
.outbtn:hover{border-color:var(--red);color:var(--red);}
/* TABS */
.tabs{display:flex;gap:5px;margin-bottom:22px;background:var(--surface);border-radius:14px;padding:5px;border:1px solid var(--border);overflow-x:auto;}
.tab{flex:1;min-width:65px;padding:9px 5px;border-radius:10px;border:none;background:none;color:var(--muted);font-family:'Syne',sans-serif;font-weight:700;font-size:.68rem;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3);}
/* CARD */
.gc{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:20px;}
.sl{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:3px;margin-bottom:15px;}
